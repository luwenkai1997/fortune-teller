<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算命机器人</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div class="container">
        <h1>🔮 算命机器人</h1>
        
        <div class="form-card" role="form" aria-label="算命表单">
            <div class="form-group">
                <label for="birthDate">
                    出生日期
                    <span class="tooltip" title="请输入公历出生日期">ℹ️</span>
                </label>
                <input type="date" id="birthDate" required min="1900-01-01" max="2026-12-31">
                <small class="hint">支持1900年至今的日期</small>
                <div class="error-hint" id="birthDateError"></div>
            </div>
            
            <div class="form-group">
                <label for="birthTime">
                    出生时间
                    <span class="tooltip" title="请选择出生时间，不知道具体时间可选择12:00">ℹ️</span>
                </label>
                <input type="time" id="birthTime" required>
                <small class="hint">请选择出生时间（公历）</small>
                <div class="error-hint" id="birthTimeError"></div>
            </div>
            
            <div class="form-group">
                <label for="gender">性别</label>
                <select id="gender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="questionType">想问什么？</label>
                <select id="questionType">
                    <option value="事业">事业</option>
                    <option value="姻缘">姻缘</option>
                    <option value="财运">财运</option>
                    <option value="健康">健康</option>
                    <option value="学业">学业</option>
                    <option value="其他">其他</option>
                </select>
            </div>
            
            <button class="btn" id="calculateBtn" onclick="calculate()">开始算命</button>
        </div>
        
        <div class="result-card" id="result">
        </div>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
